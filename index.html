<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Motion Impostor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #video-container {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    #video-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* หน้า PLAY */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      cursor: pointer;
    }

    #playBtn {
      background: transparent;
      border: 2px solid #fff;
      color: #fff;
      font-size: 1.2rem;
      padding: 16px 40px;
      border-radius: 50px;
      letter-spacing: 2px;
      pointer-events: none;
      transition: background 0.3s;
      font-family: sans-serif;
    }

    #overlay:hover #playBtn {
      background: rgba(255,255,255,0.15);
    }

    /* ปุ่มเสียง */
    #soundBtn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 20;
      display: none;
      background: transparent;
      border: 2px solid #fff;
      color: #fff;
      font-size: 0.75rem;
      padding: 8px 18px;
      border-radius: 50px;
      letter-spacing: 1.5px;
      cursor: pointer;
      font-family: sans-serif;
      transition: background 0.3s;
    }

    #soundBtn:hover {
      background: rgba(255,255,255,0.15);
    }

    /* layer รับ click ระหว่างวิดีโอเล่น */
    #click-layer {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="video-container">
    <iframe
      id="vimeoFrame"
      src="https://player.vimeo.com/video/1178206165?badge=0&autopause=0&player_id=0&app_id=58479&controls=0&autoplay=0&muted=1"
      allow="autoplay; fullscreen; picture-in-picture"
      allowfullscreen
    ></iframe>
  </div>

  <div id="overlay">
    <button id="playBtn">PLAY</button>
  </div>

  <button id="soundBtn">SOUND ON</button>

  <div id="click-layer"></div>

  <script src="https://player.vimeo.com/api/player.js"></script>
  <script>
    const overlay = document.getElementById('overlay');
    const clickLayer = document.getElementById('click-layer');
    const soundBtn = document.getElementById('soundBtn');
    const iframe = document.getElementById('vimeoFrame');

    let player;
    let isMuted = true;
    let skipReady = false;
    let skipped = false;

    overlay.addEventListener('click', function () {
      overlay.style.display = 'none';
      clickLayer.style.display = 'block';
      soundBtn.style.display = 'block';

      player = new Vimeo.Player(iframe);
      player.setMuted(true).then(function () {
        player.play();
      });
    });

    soundBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      if (!player) return;
      if (isMuted) {
        player.setMuted(false);
        player.setVolume(1);
        isMuted = false;
        soundBtn.textContent = 'SOUND OFF';
      } else {
        player.setMuted(true);
        isMuted = true;
        soundBtn.textContent = 'SOUND ON';
      }
    });

    clickLayer.addEventListener('click', function () {
      if (skipReady && !skipped && player) {
        skipped = true;
        player.setCurrentTime(8.85);
      }
    });

    // ต้องรอ player ready ก่อนจึง listen timeupdate
    overlay.addEventListener('click', function () {
      setTimeout(function () {
        if (!player) return;
        player.on('timeupdate', function (data) {
          const t = data.seconds;
          if (t >= 7 && t < 8.85) {
            skipReady = true;
          } else if (t >= 8.85) {
            skipReady = false;
            skipped = false;
          }
        });
      }, 1000);
    });
  </script>

</body>
</html>
