<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Motion Impostor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      cursor: pointer;
    }

    #playBtn {
      background: transparent;
      border: 2px solid #fff;
      color: #fff;
      font-size: 1.2rem;
      padding: 16px 40px;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.3s;
      pointer-events: none;
    }

    #overlay:hover #playBtn {
      background: rgba(255,255,255,0.15);
    }

    #video-container {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 1;
    }

    #video-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #click-layer {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="overlay">
    <button id="playBtn">▶ PLAY</button>
  </div>

  <div id="video-container">
    <iframe
      id="vimeoFrame"
      src="https://player.vimeo.com/video/1178206165?badge=0&autopause=0&player_id=0&app_id=58479&controls=0&autoplay=1"
      allow="autoplay; fullscreen; picture-in-picture"
      allowfullscreen
    ></iframe>
  </div>

  <div id="click-layer"></div>

  <script src="https://player.vimeo.com/api/player.js"></script>
  <script>
    const overlay = document.getElementById('overlay');
    const videoContainer = document.getElementById('video-container');
    const clickLayer = document.getElementById('click-layer');
    const iframe = document.getElementById('vimeoFrame');

    let player;
    let skipReady = false;
    let skipped = false;

    overlay.addEventListener('click', function () {
      overlay.style.display = 'none';
      videoContainer.style.display = 'block';
      clickLayer.style.display = 'block';

      player = new Vimeo.Player(iframe);

      player.on('timeupdate', function (data) {
        const t = data.seconds;
        if (t >= 7 && t < 9) {
          skipReady = true;
        } else if (t >= 9) {
          skipReady = false;
          skipped = false;
        }
      });
    });

    clickLayer.addEventListener('click', function () {
      if (skipReady && !skipped && player) {
        skipped = true;
        player.setCurrentTime(9);
      }
    });
  </script>

</body>
</html>
